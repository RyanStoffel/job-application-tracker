<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Job Application Tracker</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1a1a1a;
        background: #ffffff;
      }
      main {
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        font-weight: 700;
        margin: 0 0 12px 0;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #444;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 13px;
      }
      button {
        width: 100%;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 600;
        background: #0a66c2;
        color: white;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      button.secondary {
        background: transparent;
        color: #444;
        border: 1px solid #ccc;
        margin-top: 8px;
      }
      .error {
        background: #fdecea;
        color: #a4262c;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      .field-error {
        color: #a4262c;
        font-size: 11px;
        margin: -8px 0 12px 0;
      }
      .user-row {
        margin-bottom: 12px;
      }
      .user-name {
        font-weight: 600;
        font-size: 14px;
      }
      .user-email {
        color: #666;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main id="app">Loading…</main>
    <script src="popup.js"></script>
  </body>
</html>
