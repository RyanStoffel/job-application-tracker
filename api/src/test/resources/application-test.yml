spring:
  datasource:
    url: jdbc:h2:mem:jobtracker-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    secret: test-only-secret-key-for-junit-tests-32-bytes-minimum
    expiration-minutes: 10080
  cors:
    web-app-origin: http://localhost:3000
